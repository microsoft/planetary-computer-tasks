name: stac-geoparquet-manual
dataset: stac-geoparquet-manual
id: stac-geoparquet-manual

jobs:
  geoparquet:
    tasks:
      - id: update
        image: pccomponents.azurecr.io/pctasks-stac-geoparquet:2026.01.05.1
        code:
          src: ${{ local.path(pc_stac_geoparquet.py) }}
          requirements: ${{ local.path(./requirements.txt) }}
        task: pc_stac_geoparquet:StacGeoparquetTask
        tags:
          #   # temporarily set this when creating the geoparquet files
          #   # for a new collection to avoid OOM kills
          batch_pool_id: tsk_db_gr
        args:
          table_account_url: "https://pcapi.table.core.windows.net"
          table_name: "greencollectionconfig"
          storage_options_account_name: "pcstacitems"
          # collections: "chesapeake-lu" # Set if you want to generate only one geoparquet file
          collections:
            - "met-office-global-deterministic-height"
            - "met-office-global-deterministic-near-surface"
            - "met-office-global-deterministic-pressure"
            - "met-office-global-deterministic-whole-atmosphere"
            - "met-office-uk-deterministic-height"
            - "met-office-uk-deterministic-near-surface"
            - "met-office-uk-deterministic-pressure"
            - "met-office-uk-deterministic-whole-atmosphere"
          extra_skip:
            - "chesapeake-lc-13"
            - "chesapeake-lc-7"
            - "chesapeake-lu"
            - "drcog-lulc"
        environment:
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.task-application-insights-connection-string }}
          STAC_GEOPARQUET_CONNECTION_INFO: ${{secrets.pgstac-connection-string}}
          TMPDIR: /mnt/resource
